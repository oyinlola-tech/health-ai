services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-medexplain_root_password}
      MYSQL_DATABASE: ${DB_NAME:-medexplain_ai}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-medexplain_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-medexplain_root_password}
      DB_NAME: ${DB_NAME:-medexplain_ai}
      DEMO_MODE: ${DEMO_MODE:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@medexplain.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeThisAdminPassword123!}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-a-strong-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-a-strong-refresh-secret}
      COOKIE_SECRET: ${COOKIE_SECRET:-replace-with-a-strong-cookie-secret}
      CSRF_SECRET: ${CSRF_SECRET:-replace-with-a-strong-csrf-secret}
      MESSAGE_ENCRYPTION_SECRET: ${MESSAGE_ENCRYPTION_SECRET:-replace-with-a-strong-message-encryption-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPAY_MERCHANT_ID: ${OPAY_MERCHANT_ID:-}
      OPAY_PUBLIC_KEY: ${OPAY_PUBLIC_KEY:-}
      OPAY_SECRET_KEY: ${OPAY_SECRET_KEY:-}
      OPAY_WEBHOOK_SECRET: ${OPAY_WEBHOOK_SECRET:-}
      UPLOAD_ROOT: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql_data:
  uploads_data:
