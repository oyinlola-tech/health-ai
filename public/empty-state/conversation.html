<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MedExplain AI - Ask AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Spectral:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />

          extend: {
            colors: {
              "error-container": "#ffdad6",

              "on-tertiary-fixed": "#1a1c1e",
              "on-primary-fixed": "#1e1b18",
              "surface-bright": "#fdf8f7",
              "on-secondary-fixed-variant": "#4c463f",
              primary: "#161310",
              "outline-variant": "#cfc4bd",
              "on-tertiary-container": "#8f8f91",
              "on-secondary-fixed": "#201b15",
              "on-background": "#1c1b1b",
              secondary: "#645d56",
              "on-secondary": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e6e1e0",
              "on-tertiary": "#ffffff",
              "secondary-fixed-dim": "#cfc5bc",
              "on-secondary-container": "#69615a",
              "tertiary-fixed-dim": "#c7c6c8",
              "inverse-primary": "#cdc5c0",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#948e89",
              "on-primary-fixed-variant": "#4b4642",
              error: "#ba1a1a",
              "primary-fixed": "#e9e1dc",
              "on-surface-variant": "#4d4540",
              "primary-fixed-dim": "#cdc5c0",
              "on-error-container": "#93000a",
              "primary-container": "#2b2724",
              "surface-container-high": "#ece7e6",
              "on-tertiary-fixed-variant": "#464749",
              "inverse-on-surface": "#f4f0ee",
              "surface-variant": "#e6e1e0",
              "secondary-fixed": "#ebe1d8",
              tertiary: "#121415",
              "surface-container": "#f1edec",
              "surface-tint": "#635d5a",
              "on-error": "#ffffff",
              coral: {
                DEFAULT: "#FF6E5C",
                light: "rgba(255, 110, 92, 0.05)",
                ring: "rgba(255, 110, 92, 0.2)",
              },
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xxl: "48px",
              "margin-desktop": "64px",
              md: "16px",
              gutter: "16px",
              xl: "32px",
              base: "8px",
              xs: "4px",
              lg: "24px",
              "margin-mobile": "20px",
              sm: "8px",
              safe: "env(safe-area-inset-bottom)",
            },
            fontFamily: {
              "label-md": ["Inter"],
              "display-lg": ["Spectral"],
              "title-lg": ["Inter"],
              "headline-lg-mobile": ["Spectral"],
              "headline-md": ["Spectral"],
              "body-lg": ["Inter"],
              caption: ["Inter"],
              "body-md": ["Inter"],
              "headline-lg": ["Spectral"],
            },
            fontSize: {
              "label-md": [
                "14px",
                {
                  lineHeight: "20px",
                  letterSpacing: "0.01em",
                  fontWeight: "500",
                },
              ],
              "display-lg": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              "title-lg": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "headline-lg-mobile": [
                "28px",
                { lineHeight: "34px", fontWeight: "600" },
              ],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "500" },
              ],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              caption: ["12px", { lineHeight: "16px", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-lg": [
                "32px",
                { lineHeight: "40px", fontWeight: "600" },
              ],
            },
            boxShadow: {
              "ambient-1": "0 4px 12px rgba(0, 0, 0, 0.04)",
              "ambient-2": "0 8px 20px rgba(0, 0, 0, 0.06)",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .icon-fill {
        font-variation-settings: "FILL" 1;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg" />
    <link rel="manifest" href="/assets/brand/site.webmanifest" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body
    class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased"
  >
    <!-- TopNavBar -->
    <header
      class="bg-surface dark:bg-surface-dim full-width top-0 z-40 hidden md:flex"
    >
      <div
        class="flex justify-between items-center w-full px-margin-desktop h-16 max-w-[1120px] mx-auto"
      >
        <div class="flex items-center gap-base">
          <span
            class="material-symbols-outlined text-primary dark:text-primary-fixed cursor-pointer"
            >chevron_left</span
          >
          <span
            class="text-headline-md font-headline-md text-primary dark:text-primary-fixed"
            >MedExplain AI</span
          >
        </div>
        <nav class="flex gap-lg">
          <a
            class="text-label-md font-label-md text-outline hover:bg-surface-container-low transition-colors duration-200 px-3 py-2 rounded-md"
            href="/health/dashboard.html"
            >Insights</a
          >
          <a
            class="text-label-md font-label-md text-outline hover:bg-surface-container-low transition-colors duration-200 px-3 py-2 rounded-md"
            href="/report/summary.html"
            >Records</a
          >
          <a
            class="text-label-md font-label-md text-primary font-bold opacity-70 transition-opacity hover:bg-surface-container-low duration-200 px-3 py-2 rounded-md border-b-2 border-coral"
            href="/ai-assistant/chat-home.html"
            >Ask AI</a
          >
          <a
            class="text-label-md font-label-md text-outline hover:bg-surface-container-low transition-colors duration-200 px-3 py-2 rounded-md"
            href="/profile/overview.html"
            >Profile</a
          >
        </nav>
        <div class="flex items-center gap-base">
          <button
            class="text-primary dark:text-primary-fixed hover:bg-surface-container-low p-2 rounded-full transition-colors duration-200"
          >
            <span class="material-symbols-outlined">help_outline</span>
          </button>
        </div>
      </div>
    </header>
    <!-- Main Content -->
    <main
      class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-xxl w-full max-w-[1120px] mx-auto mb-20 md:mb-0"
    >
      <div
        class="max-w-2xl w-full flex flex-col items-center text-center space-y-lg"
      >
        <!-- AI Illustration -->
        <div class="relative w-32 h-32 mb-md">
          <div
            class="absolute inset-0 bg-coral/10 rounded-[2rem] rounded-bl-none transform rotate-3 flex items-center justify-center animate-pulse"
          ></div>
          <div
            class="absolute inset-0 bg-white rounded-[2rem] rounded-bl-none shadow-ambient-1 border border-outline-variant/30 flex items-center justify-center z-10"
          >
            <span
              class="material-symbols-outlined text-[48px] text-coral icon-fill"
              >auto_awesome</span
            >
          </div>
        </div>
        <div class="space-y-base">
          <h1
            class="text-headline-lg-mobile md:text-headline-lg font-headline-lg-mobile md:font-headline-lg text-primary"
          >
            Ask Your First Question
          </h1>
          <p
            class="text-body-lg font-body-lg text-on-surface-variant max-w-lg mx-auto"
          >
            Need clarity on a medical term or report? Our AI assistant is here
            to explain things in plain language.
          </p>
        </div>
        <!-- Suggested Questions -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-md w-full mt-xl">
          <button
            class="bg-white border border-outline-variant/50 rounded-xl p-md shadow-ambient-1 hover:shadow-ambient-2 hover:border-coral/50 transition-all duration-200 text-left flex items-start gap-sm group"
          >
            <span
              class="material-symbols-outlined text-coral/70 group-hover:text-coral transition-colors mt-0.5"
              >help</span
            >
            <span
              class="text-body-md font-body-md text-on-surface group-hover:text-primary transition-colors"
              >What does LDL mean?</span
            >
          </button>
          <button
            class="bg-white border border-outline-variant/50 rounded-xl p-md shadow-ambient-1 hover:shadow-ambient-2 hover:border-coral/50 transition-all duration-200 text-left flex items-start gap-sm group"
          >
            <span
              class="material-symbols-outlined text-coral/70 group-hover:text-coral transition-colors mt-0.5"
              >help</span
            >
            <span
              class="text-body-md font-body-md text-on-surface group-hover:text-primary transition-colors"
              >How to read a CBC?</span
            >
          </button>
        </div>
        <!-- Primary CTA -->
        <div class="w-full mt-xl flex justify-center">
          <button
            class="bg-coral text-white text-title-lg font-title-lg h-[48px] px-xl rounded-full shadow-ambient-1 hover:shadow-ambient-2 transform hover:-translate-y-0.5 transition-all duration-200 flex items-center gap-sm"
          >
            <span class="material-symbols-outlined text-white">chat</span>
            Start Conversation
          </button>
        </div>
      </div>
    </main>
    <!-- BottomNavBar (Mobile) -->
    <nav
      class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface dark:bg-surface-dim shadow-sm rounded-t-xl border-t border-outline-variant dark:border-outline"
    >
      <a
        class="flex flex-col items-center justify-center text-outline dark:text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed w-16"
        href="/app/dashboard.html"
      >
        <span class="material-symbols-outlined mb-1">analytics</span>
        <span class="text-[10px] font-label-md">Insights</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-outline dark:text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed w-16"
        href="/app/dashboard.html"
      >
        <span class="material-symbols-outlined mb-1">folder_open</span>
        <span class="text-[10px] font-label-md">Records</span>
      </a>
      <a
        class="flex flex-col items-center justify-center bg-secondary-container dark:bg-primary-container text-on-secondary-container dark:text-on-primary-container rounded-full px-5 py-1 scale-95 transition-transform duration-150 w-20"
        href="/app/dashboard.html"
      >
        <span class="material-symbols-outlined icon-fill mb-1"
          >auto_awesome</span
        >
        <span class="text-[10px] font-label-md">Ask AI</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-outline dark:text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed w-16"
        href="/profile/overview.html"
      >
        <span class="material-symbols-outlined mb-1">person</span>
        <span class="text-[10px] font-label-md">Profile</span>
      </a>
    </nav>
    <script type="module" src="/assets/js/page.js"></script>
  </body>
</html>
