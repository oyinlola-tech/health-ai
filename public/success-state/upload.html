<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Report Upload Success - Medical Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Spectral:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#ffffff",
              "on-error-container": "#93000a",
              "on-background": "#1c1b1b",
              "surface-dim": "#ddd9d8",
              "on-primary-fixed": "#1e1b18",
              error: "#FF6E5C",
              "on-secondary": "#ffffff",
              "primary-container": "#2b2724",
              "on-primary-fixed-variant": "#4b4642",
              "surface-bright": "#fdf8f7",
              "surface-container-low": "#f7f3f1",
              primary: "#2B2724",
              "on-surface": "#1c1b1b",
              "on-error": "#ffffff",
              surface: "#FFFFFF",
              secondary: "#A19890",
              "primary-fixed": "#e9e1dc",
              "surface-container": "#f1edec",
              "primary-fixed-dim": "#cdc5c0",
              "secondary-fixed": "#ebe1d8",
              "secondary-container": "#e9ded5",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#635d5a",
              "inverse-primary": "#cdc5c0",
              "surface-variant": "#e6e1e0",
              "tertiary-fixed": "#e3e2e4",
              "on-tertiary-fixed-variant": "#464749",
              "on-tertiary-fixed": "#1a1c1e",
              "on-tertiary-container": "#8f8f91",
              "on-surface-variant": "#4d4540",
              "on-secondary-fixed": "#201b15",
              tertiary: "#2B2724",
              "surface-container-highest": "#e6e1e0",
              "secondary-fixed-dim": "#cfc5bc",
              "inverse-surface": "#313030",
              "tertiary-container": "#27282a",
              "outline-variant": "#cfc4bd",
              "on-secondary-fixed-variant": "#4c463f",
              "tertiary-fixed-dim": "#c7c6c8",
              background: "#FDF6F3",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#f4f0ee",
              "on-secondary-container": "#69615a",
              "error-container": "#ffdad6",
              "on-primary-container": "#948e89",
              "surface-container-high": "#ece7e6",
              outline: "#A19890",
              coral: "#FF6E5C",
              "coral-light": "rgba(255, 110, 92, 0.05)",
              "muted-stone": "#E8E4E1",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              xs: "4px",
              sm: "8px",
              md: "16px",
              lg: "24px",
              xl: "32px",
              xxl: "48px",
              base: "8px",
              "margin-mobile": "20px",
              gutter: "16px",
              "margin-desktop": "64px",
            },
            fontFamily: {
              "title-lg": ["Inter"],
              caption: ["Inter"],
              "body-md": ["Inter"],
              "label-md": ["Inter"],
              "body-lg": ["Inter"],
              "headline-md": ["Spectral"],
              "headline-lg": ["Spectral"],
              "headline-lg-mobile": ["Spectral"],
              "display-lg": ["Spectral"],
            },
            fontSize: {
              "title-lg": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              caption: ["12px", { lineHeight: "16px", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "label-md": [
                "14px",
                {
                  lineHeight: "20px",
                  letterSpacing: "0.01em",
                  fontWeight: "500",
                },
              ],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "500" },
              ],
              "headline-lg": [
                "32px",
                { lineHeight: "40px", fontWeight: "600" },
              ],
              "headline-lg-mobile": [
                "28px",
                { lineHeight: "34px", fontWeight: "600" },
              ],
              "display-lg": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
            },
            boxShadow: {
              "ambient-1": "0 4px 12px rgba(0, 0, 0, 0.04)",
              "ambient-2": "0 8px 20px rgba(0, 0, 0, 0.06)",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #fdf6f3;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid #e8e4e1;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="../assets/brand/favicon.svg" />
    <link rel="manifest" href="../assets/brand/site.webmanifest" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-[#FDF6F3] text-on-surface"
  >
    <!-- Success Container -->
    <main class="w-full max-w-lg mx-auto">
      <div
        class="glass-card rounded-xl p-xl shadow-ambient-1 text-center animate-[fadeIn_0.5s_ease-out]"
      >
        <!-- Success Icon -->
        <div
          class="mb-lg inline-flex items-center justify-center w-24 h-24 rounded-full bg-coral-light border border-coral/20"
        >
          <span
            class="material-symbols-outlined text-[64px] text-coral"
            style="font-variation-settings: &quot;FILL&quot; 1"
          >
            check_circle
          </span>
        </div>
        <!-- Heading -->
        <h1
          class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-sm"
        >
          Report Uploaded Successfully
        </h1>
        <p class="font-body-md text-body-md text-on-surface-variant mb-xl">
          Your medical report has been securely encrypted and saved to your
          portal.
        </p>
        <!-- File Summary Card -->
        <div
          class="bg-surface-container-low border border-muted-stone rounded-lg p-md mb-xl flex items-center gap-md text-left shadow-sm"
        >
          <div
            class="flex-shrink-0 w-12 h-12 bg-surface rounded flex items-center justify-center border border-muted-stone"
          >
            <span class="material-symbols-outlined text-secondary">
              description
            </span>
          </div>
          <div class="flex-grow overflow-hidden">
            <h3 class="font-label-md text-label-md text-primary truncate">
              MRI_Cervical_Spine_2023.pdf
            </h3>
            <p class="font-caption text-caption text-on-surface-variant">
              4.2 MB • Uploaded just now
            </p>
          </div>
          <button
            aria-label="View file details"
            class="flex-shrink-0 p-sm text-on-surface-variant hover:text-coral transition-colors rounded-full hover:bg-surface-variant"
          >
            <span class="material-symbols-outlined text-[20px]"> info </span>
          </button>
        </div>
        <!-- Actions -->
        <div class="flex flex-col gap-md">
          <button
            class="w-full min-h-[48px] bg-coral hover:bg-[#E55B49] text-white rounded-lg font-label-md text-label-md transition-all shadow-ambient-1 hover:shadow-ambient-2 flex items-center justify-center gap-sm"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              style="font-variation-settings: &quot;FILL&quot; 1"
            >
              auto_awesome
            </span>
            Start AI Analysis
          </button>
          <button
            class="w-full min-h-[48px] bg-surface hover:bg-surface-container border border-muted-stone text-primary rounded-lg font-label-md text-label-md transition-all shadow-sm"
          >
            Upload Another
          </button>
        </div>
        <!-- Subtle Return Link -->
        <div class="mt-lg">
          <a
            class="inline-flex items-center gap-xs font-caption text-caption text-secondary hover:text-primary transition-colors"
            href="/dashboard"
          >
            <span class="material-symbols-outlined text-[16px]"
              >arrow_back</span
            >
            Return to Dashboard
          </a>
        </div>
      </div>
    </main>
    <script type="module" src="../assets/js/page.js"></script>
  </body>
</html>
