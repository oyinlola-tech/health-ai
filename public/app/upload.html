<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Transactional Screen: Navigation Suppressed -->
<main class="w-full max-w-2xl mx-auto flex flex-col gap-xl">
<!-- Header Section -->
<header class="text-center flex flex-col items-center gap-md">
<div class="h-16 w-16 bg-surface-container-high rounded-full flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-coral" style="font-size: 32px;">upload_file</span>
</div>
<h1 class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg text-primary">Upload Medical Report</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg">
                Securely upload your lab results or medical documents for AI-assisted analysis and translation into plain language.
            </p>
</header>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-lg">
<!-- Option 1: Camera Scan -->
<button class="flex flex-col items-center text-center p-xl bg-surface-container-lowest border border-outline-variant rounded-xl hover:shadow-[0_8px_20px_rgba(0,0,0,0.06)] hover:-translate-y-1 transition-all duration-300 group focus:outline-none focus:ring-2 focus:ring-coral/20 focus:border-primary">
<div class="h-12 w-12 rounded-full bg-surface-container-low flex items-center justify-center mb-md group-hover:bg-coral/10 transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-coral transition-colors">photo_camera</span>
</div>
<h2 class="font-title-lg text-title-lg text-primary mb-xs">Camera Scan</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Take a clear photo of your physical document.</p>
</button>
<!-- Option 2: Select File -->
<button class="flex flex-col items-center text-center p-xl bg-surface-container-lowest border border-outline-variant rounded-xl hover:shadow-[0_8px_20px_rgba(0,0,0,0.06)] hover:-translate-y-1 transition-all duration-300 group focus:outline-none focus:ring-2 focus:ring-coral/20 focus:border-primary">
<div class="h-12 w-12 rounded-full bg-surface-container-low flex items-center justify-center mb-md group-hover:bg-coral/10 transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-coral transition-colors">folder_open</span>
</div>
<h2 class="font-title-lg text-title-lg text-primary mb-xs">Select File</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Browse your device for a saved digital copy.</p>
</button>
<!-- Option 3: Paste Text -->
<button class="flex flex-col items-center text-center p-xl bg-surface-container-lowest border border-outline-variant rounded-xl hover:shadow-[0_8px_20px_rgba(0,0,0,0.06)] hover:-translate-y-1 transition-all duration-300 group focus:outline-none focus:ring-2 focus:ring-coral/20 focus:border-primary">
<div class="h-12 w-12 rounded-full bg-surface-container-low flex items-center justify-center mb-md group-hover:bg-coral/10 transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-coral transition-colors">content_paste</span>
</div>
<h2 class="font-title-lg text-title-lg text-primary mb-xs">Paste Text</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Directly paste text from an online patient portal.</p>
</button>
</div>
<!-- Supportive Info -->
<div class="flex flex-col items-center justify-center text-center gap-sm mt-md">
<p class="font-caption text-caption text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined" style="font-size: 16px;">info</span>
                Supported formats: PDF, JPG, PNG. Maximum file size: 10MB.
            </p>
<p class="font-caption text-caption text-on-tertiary-container flex items-center gap-xs">
<span class="material-symbols-outlined" style="font-size: 16px;">lock</span>
                Your health data is encrypted and securely processed.
            </p>
</div>
<!-- Actions -->
<div class="flex justify-center mt-lg w-full max-w-sm mx-auto">
<button class="w-full py-md px-xl bg-surface-container-low text-primary font-label-md text-label-md rounded-lg border border-outline-variant hover:bg-surface-container-high transition-colors focus:outline-none focus:ring-2 focus:ring-primary/20">
                Cancel
            </button>
</div>
