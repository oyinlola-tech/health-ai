<style>
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #FF6E5C;
            border-radius: 50%;
            animation: explode 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .success-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 110, 92, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(255, 110, 92, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 110, 92, 0);
            }
        }
        
        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#FF6E5C', '#cfc4bd', '#645d56']; // Coral, Muted Stone, Secondary
            const numConfetti = 50;

            for (let i = 0; i < numConfetti; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Randomize position from center
                const tx = (Math.random() - 0.5) * 400 + 'px';
                const ty = (Math.random() - 0.5) * 400 + 'px';
                
                confetti.style.setProperty('--tx', tx);
                confetti.style.setProperty('--ty', ty);
                
                // Randomize color
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Randomize size and delay
                const size = Math.random() * 6 + 4 + 'px';
                confetti.style.width = size;
                confetti.style.height = size;
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                // Initial position at center
                confetti.style.left = '50%';
                confetti.style.top = '30%'; // Slightly above center to match icon
                
                container.appendChild(confetti);
            }
        });
    </script>
