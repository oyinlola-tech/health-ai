  <body
    class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-error-container selection:text-on-error-container"
  >
    <!-- Top Navigation Anchor (Suppressed shell, but keeping a minimal brand header for a transactional/error state) -->
    <header
      class="w-full flex justify-center py-md px-margin-mobile md:px-margin-desktop sticky top-0 z-50 bg-background/80 backdrop-blur-sm"
    >
      <div class="flex items-center gap-sm">
        <span
          class="material-symbols-outlined text-wellness-coral text-[28px]"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >medical_services</span
        >
        <span
          class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-md md:text-headline-md text-primary tracking-tight"
          >MedExplain AI</span
        >
      </div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-xxl"
    >
      <div class="w-full max-w-[560px] flex flex-col items-center text-center">
        <!-- Error Graphic/Icon -->
        <div
          class="mb-lg relative flex items-center justify-center w-24 h-24 rounded-full bg-error-container text-on-error-container shadow-[0_4px_12px_rgba(186,26,26,0.12)]"
        >
          <span
            class="material-symbols-outlined text-[48px]"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >document_scanner</span
          >
          <!-- Badge indicating failure -->
          <div
            class="absolute -bottom-2 -right-2 bg-background rounded-full p-1"
          >
            <div
              class="bg-error text-on-error rounded-full w-8 h-8 flex items-center justify-center"
            >
              <span
                class="material-symbols-outlined text-[20px]"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >warning</span
              >
            </div>
          </div>
        </div>
        <!-- Typography Hierarchy -->
        <h1
          class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-sm"
        >
          We couldn't read this report
        </h1>
        <p
          class="font-body-lg text-body-lg text-on-surface-variant max-w-[480px] mb-xxl"
        >
          Our AI wasn't able to confidently process the document you uploaded.
          This usually happens if the image is too blurry, or if the report
          layout is unusually complex.
        </p>
        <!-- Action Area -->
        <div class="flex flex-col w-full sm:w-auto gap-md w-full max-w-[320px]">
          <button
            class="w-full flex items-center justify-center gap-sm bg-[#FF6E5C] text-white font-label-md text-label-md h-[48px] rounded-full hover:shadow-[0_8px_20px_rgba(0,0,0,0.06)] hover:-translate-y-0.5 transition-all duration-200"
          >
            <span class="material-symbols-outlined text-[20px]"
              >upload_file</span
            >
            Try Again
          </button>
          <button
            class="w-full flex items-center justify-center gap-sm bg-surface-container-highest text-on-surface-variant font-label-md text-label-md h-[48px] rounded-full hover:bg-surface-variant transition-colors duration-200"
          >
            <span class="material-symbols-outlined text-[20px]"
              >support_agent</span

            Contact Support
          </button>
